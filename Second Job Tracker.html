<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#142019; --panel:#1d2d24; --panel-2:#233a2e; --line:#33493b;
    --text:#c2cfb2; --muted:#8b9c7e; --faint:#6f8473; --cream:#ece8db;
    --teal:#5fa39a; --rust:#c4673c; --sage:#8ba888;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--mono);background:var(--bg);color:var(--text);line-height:1.5;padding:36px 20px 56px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto}

  header{margin-bottom:8px}
  .eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);font-weight:600;margin-bottom:8px}
  h1{font-size:26px;font-weight:600;color:var(--cream);letter-spacing:-.01em;line-height:1.1}
  .sub{font-size:12px;color:var(--muted);margin-top:8px;padding-bottom:18px;border-bottom:1px solid var(--line)}

  .seclabel{display:flex;align-items:center;gap:.75rem;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--cream);margin:26px 0 14px}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .seclabel .small{color:var(--faint);letter-spacing:.06em;text-transform:none;font-size:10px;cursor:pointer;background:none;border:none;font-family:inherit;text-decoration:underline;flex:none}
  .seclabel .small:hover{color:var(--rust)}

  /* shifts */
  .shift{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:7px}
  .shift.done{background:var(--panel-2);border-color:#3a5a48}
  .shift .day{font-size:13px;min-width:120px;flex-shrink:0}
  .shift.done .day{color:var(--teal);font-weight:500}
  .dots{display:flex;gap:10px;flex:1}
  .dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--faint);background:transparent;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;padding:0;transition:background .15s,border-color .15s,transform .08s}
  .dot:hover{border-color:var(--teal)}
  .dot:active{transform:scale(.9)}
  .dot.done{background:var(--teal);border-color:var(--teal)}
  .dot.done::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--bg)}
  .dot:focus-visible{outline:2px solid var(--rust);outline-offset:2px}
  .shift .cnt{font-size:11px;color:var(--faint);min-width:30px;text-align:right;letter-spacing:.04em}
  .shift.done .cnt{color:var(--teal)}
  .wk-summary{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.04em}

  /* earnings */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px}
  .rate-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:16px;padding-bottom:16px;border-bottom:1px dashed var(--line)}
  .rate-row label{color:var(--rust);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
  input.rate{width:92px;font-family:var(--mono);background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--cream);padding:7px 10px;font-size:13px}
  input.rate:focus{outline:none;border-color:var(--teal)}
  .rate-src{font-size:10.5px;color:var(--faint);flex-basis:100%}
  .rate-src button{background:none;border:none;color:var(--teal);font-family:inherit;font-size:10.5px;text-decoration:underline;cursor:pointer;padding:0}

  .entry-form{display:flex;align-items:stretch;gap:8px;flex-wrap:wrap}
  .usd-wrap{position:relative;flex:1;min-width:120px}
  .usd-wrap::before{content:"$";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:14px;pointer-events:none}
  input.usd{width:100%;font-family:var(--mono);background:var(--bg);border:1px solid var(--line);border-radius:6px;color:var(--cream);padding:10px 12px 10px 24px;font-size:15px}
  input.usd:focus{outline:none;border-color:var(--teal)}
  .preview{display:flex;align-items:center;font-size:14px;color:var(--sage);white-space:nowrap;padding:0 4px}
  button.log{font-family:var(--mono);background:var(--teal);color:var(--bg);border:none;border-radius:6px;padding:10px 18px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;transition:transform .08s}
  button.log:active{transform:scale(.97)}
  button.log:focus-visible{outline:2px solid var(--rust);outline-offset:2px}

  .entries{margin-top:16px;list-style:none}
  .entries li{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;padding:9px 0;border-top:1px dashed var(--line)}
  .entries .amt{color:var(--text)}
  .entries .amt b{color:var(--cream);font-weight:600}
  .entries .meta{color:var(--faint);font-size:10.5px}
  .entries .rm{background:none;border:none;color:var(--faint);cursor:pointer;font-family:inherit;font-size:14px;padding:0 4px;line-height:1}
  .entries .rm:hover{color:var(--rust)}
  .empty{font-size:12px;color:var(--faint);font-style:italic;margin-top:14px}

  /* target */
  .track{height:8px;background:var(--line);border-radius:100px;overflow:hidden;margin-top:4px}
  .fill{height:100%;width:0;background:var(--teal);border-radius:100px;transition:width .35s ease}
  .track-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.04em}
  .stats{display:flex;gap:30px;margin-top:18px}
  .stat .num{font-size:26px;font-weight:600;color:var(--cream);line-height:1}
  .stat .lbl{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .met{color:var(--teal);font-size:12px;margin-top:14px;letter-spacing:.03em}

  .foot{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end}
  button.reset{font-family:var(--mono);background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:9px 16px;font-size:12px;cursor:pointer;letter-spacing:.04em;transition:border-color .15s,color .15s}
  button.reset:hover{border-color:var(--rust);color:var(--rust)}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media print{
    :root{
      --bg:#fff;--panel:#fff;--panel-2:#eef3ea;--line:#cdd4c4;
      --text:#2c352c;--muted:#566256;--faint:#7a8a78;--cream:#1d2a20;
      --teal:#2f6f6a;--rust:#a8542f;--sage:#4f7a55;
    }
    body{padding:0}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Second job</div>
    <h1>Earnings tracker</h1>
    <p class="sub">Wed &amp; Fri &middot; 2 hrs each &middot; target <b style="color:var(--cream);font-weight:600">&pound;250</b> / month &middot; paid in USD</p>
  </header>

  <!-- SHIFTS -->
  <div class="seclabel">This week's shifts <button class="small" id="resetWeek">new week</button></div>
  <div id="shifts"></div>
  <p class="wk-summary" id="wkSummary">0 of 4 hours done</p>

  <!-- EARNINGS -->
  <div class="seclabel">Earnings <span style="color:var(--teal);letter-spacing:.06em" id="monthLabel"></span></div>
  <div class="card">
    <div class="rate-row">
      <label for="rate">USD &rarr; GBP</label>
      <input class="rate" type="number" id="rate" step="0.0001" min="0" inputmode="decimal">
      <span id="rateSrc" class="rate-src"></span>
    </div>
    <div class="entry-form">
      <div class="usd-wrap"><input class="usd" type="number" id="usd" placeholder="amount in USD" min="0" step="0.01" inputmode="decimal"></div>
      <span class="preview" id="preview">= &pound;0.00</span>
      <button class="log" id="logBtn">Log</button>
    </div>
    <ul class="entries" id="entries"></ul>
    <p class="empty" id="emptyNote">No earnings logged yet this month.</p>
  </div>

  <!-- TARGET -->
  <div class="seclabel">Target &middot; &pound;250</div>
  <div class="card">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="track-meta"><span id="metaLeft">&pound;0 of &pound;250</span><span id="metaRight">0%</span></div>
    <div class="stats">
      <div class="stat"><div class="num" id="sTotal">&pound;0</div><div class="lbl">earned</div></div>
      <div class="stat"><div class="num" id="sLeft">&pound;250</div><div class="lbl">to go</div></div>
    </div>
    <div class="met" id="metNote" style="display:none">Target met for the month &mdash; nice one.</div>
  </div>

  <div class="foot">
    <button class="reset" id="resetMonth">Reset month</button>
  </div>

</div>

<script>
(function(){
  var KEY = 'second-job-tracker';
  var TARGET = 250;
  var FALLBACK_RATE = 0.756;          // updated automatically from live feed on load
  var DAYS = [['wed','Wednesday'],['fri','Friday']];

  var state = {
    shifts: { wed:[false,false], fri:[false,false] },
    entries: [],            // { usd, rate, gbp, ts }
    rate: FALLBACK_RATE,
    rateManual: false,
    rateInfo: 'fallback'    // 'live' | 'manual' | 'fallback'
  };

  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){ var s = JSON.parse(raw); if(s && typeof s === 'object') state = Object.assign(state, s); }
    }catch(e){}
    if(!state.shifts) state.shifts = { wed:[false,false], fri:[false,false] };
    if(!Array.isArray(state.entries)) state.entries = [];
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

  function gbp(n){ return '\u00a3' + Number(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function gbp0(n){ return '\u00a3' + Math.round(n).toLocaleString('en-GB'); }

  // ---- live rate ----
  function applyRate(){ document.getElementById('rate').value = Number(state.rate).toFixed(4); }
  function rateSrcText(){
    if(state.rateInfo === 'manual') return 'Using your manual rate. <button id="useLive">use live rate</button>';
    if(state.rateInfo === 'live')   return 'Live mid-market rate (ECB' + (state.rateDate ? ', ' + state.rateDate : '') + '). Edit it to use your transfer\u2019s actual rate.';
    return 'Offline fallback rate \u2014 edit to your transfer\u2019s rate, or reconnect to refresh.';
  }
  function renderRateSrc(){
    var el = document.getElementById('rateSrc');
    el.innerHTML = rateSrcText();
    var ul = document.getElementById('useLive');
    if(ul) ul.addEventListener('click', function(){ state.rateManual = false; fetchRate(true); });
  }
  function fetchRate(force){
    if(state.rateManual && !force){ renderRateSrc(); return; }
    fetch('https://api.frankfurter.app/latest?from=USD&to=GBP')
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){
        if(d && d.rates && d.rates.GBP){
          state.rate = d.rates.GBP; state.rateInfo = 'live'; state.rateDate = d.date; state.rateManual = false;
          applyRate(); renderRateSrc(); preview(); save();
        }
      })
      .catch(function(){ renderRateSrc(); });
  }

  // ---- shifts ----
  function renderShifts(){
    var box = document.getElementById('shifts'); box.innerHTML = '';
    var doneHrs = 0;
    DAYS.forEach(function(d){
      var key = d[0], hrs = state.shifts[key];
      var done = hrs.filter(Boolean).length; doneHrs += done;
      var row = document.createElement('div');
      row.className = 'shift' + (done === 2 ? ' done' : '');
      var label = document.createElement('span'); label.className = 'day'; label.textContent = d[1];
      row.appendChild(label);
      var dots = document.createElement('div'); dots.className = 'dots';
      hrs.forEach(function(on, i){
        var b = document.createElement('button');
        b.className = 'dot' + (on ? ' done' : '');
        b.setAttribute('aria-label', d[1] + ' hour ' + (i+1));
        b.setAttribute('aria-pressed', on ? 'true':'false');
        b.addEventListener('click', function(){ state.shifts[key][i] = !state.shifts[key][i]; renderShifts(); save(); });
        dots.appendChild(b);
      });
      row.appendChild(dots);
      var cnt = document.createElement('span'); cnt.className = 'cnt'; cnt.textContent = done + '/2';
      row.appendChild(cnt);
      box.appendChild(row);
    });
    document.getElementById('wkSummary').textContent = doneHrs + ' of 4 hours done';
  }

  // ---- earnings + target ----
  function preview(){
    var v = parseFloat(document.getElementById('usd').value);
    document.getElementById('preview').innerHTML = '= ' + gbp(isNaN(v) || v < 0 ? 0 : v * state.rate);
  }
  function renderEntries(){
    var ul = document.getElementById('entries'); ul.innerHTML = '';
    document.getElementById('emptyNote').style.display = state.entries.length ? 'none' : 'block';
    state.entries.slice().reverse().forEach(function(e){
      var realIndex = state.entries.indexOf(e);
      var li = document.createElement('li');
      var d = new Date(e.ts);
      var when = d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
      li.innerHTML = '<span class="amt">$' + Number(e.usd).toFixed(2) + ' &rarr; <b>' + gbp(e.gbp) + '</b> '
        + '<span class="meta">' + when + ' &middot; @' + Number(e.rate).toFixed(4) + '</span></span>';
      var rm = document.createElement('button'); rm.className = 'rm'; rm.textContent = '\u00d7'; rm.title = 'Remove';
      rm.addEventListener('click', function(){ state.entries.splice(realIndex,1); renderEntries(); renderTarget(); save(); });
      li.appendChild(rm);
      ul.appendChild(li);
    });
  }
  function totalGbp(){ return state.entries.reduce(function(s,e){ return s + e.gbp; }, 0); }
  function renderTarget(){
    var total = totalGbp();
    var pct = Math.min(100, Math.round((total / TARGET) * 100));
    var left = Math.max(0, TARGET - total);
    document.getElementById('fill').style.width = pct + '%';
    document.getElementById('metaLeft').innerHTML = gbp0(total) + ' of \u00a3250';
    document.getElementById('metaRight').textContent = pct + '%';
    document.getElementById('sTotal').innerHTML = gbp0(total);
    document.getElementById('sLeft').innerHTML = gbp0(left);
    document.getElementById('metNote').style.display = total >= TARGET ? 'block' : 'none';
  }

  function monthLabel(){
    document.getElementById('monthLabel').textContent = new Date().toLocaleDateString('en-GB',{ month:'long', year:'numeric' });
  }

  // ---- events ----
  document.getElementById('usd').addEventListener('input', preview);
  document.getElementById('rate').addEventListener('input', function(){
    var v = parseFloat(this.value);
    if(!isNaN(v) && v > 0){ state.rate = v; state.rateManual = true; state.rateInfo = 'manual'; renderRateSrc(); preview(); save(); }
  });
  document.getElementById('logBtn').addEventListener('click', function(){
    var input = document.getElementById('usd');
    var v = parseFloat(input.value);
    if(isNaN(v) || v <= 0) return;
    state.entries.push({ usd:v, rate:state.rate, gbp:v * state.rate, ts:Date.now() });
    input.value = ''; preview(); renderEntries(); renderTarget(); save();
  });
  document.getElementById('usd').addEventListener('keydown', function(e){ if(e.key === 'Enter') document.getElementById('logBtn').click(); });
  document.getElementById('resetMonth').addEventListener('click', function(){
    if(!confirm('Clear this month\u2019s logged earnings? Your shift ticks stay.')) return;
    state.entries = []; renderEntries(); renderTarget(); save();
  });
  document.getElementById('resetWeek').addEventListener('click', function(){
    state.shifts = { wed:[false,false], fri:[false,false] }; renderShifts(); save();
  });

  // ---- init ----
  load();
  monthLabel();
  renderShifts();
  applyRate();
  renderRateSrc();
  preview();
  renderEntries();
  renderTarget();
  fetchRate(false);
})();
</script>
</body>
</html>
