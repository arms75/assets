<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1613;
    --surface:#16201b;
    --surface-2:#1c2822;
    --line:#2a382f;
    --text:#e7ede7;
    --muted:#8aa093;
    --sage:#8fbf95;
    --teal:#4fb3a6;
    --rust:#c2683f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"IBM Plex Mono",ui-monospace,monospace;
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:28px 18px 56px;
    max-width:560px;
    margin:0 auto;
  }
  header{margin-bottom:22px;}
  .eyebrow{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin:0 0 6px;
  }
  h1{font-size:19px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:13px;margin:0;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px 16px;
    margin-bottom:18px;
  }
  .prompt{font-size:14px;margin:0 0 14px;color:var(--text);}

  .readings{display:flex;gap:8px;margin-bottom:14px;}
  .reading{
    flex:1;cursor:pointer;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:inherit;font-size:13px;
    padding:11px 6px;
    transition:border-color .12s,background .12s;
  }
  .reading:hover{border-color:var(--muted);}
  .reading:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
  .reading.sel[data-v="okay"]{border-color:var(--sage);background:rgba(143,191,149,.14);color:var(--sage);}
  .reading.sel[data-v="mixed"]{border-color:var(--teal);background:rgba(79,179,166,.14);color:var(--teal);}
  .reading.sel[data-v="depleted"]{border-color:var(--rust);background:rgba(194,104,63,.16);color:var(--rust);}

  .word-row{display:flex;gap:8px;}
  input[type=text]{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-family:inherit;font-size:13px;
    padding:10px 12px;
  }
  input[type=text]::placeholder{color:var(--muted);}
  input[type=text]:focus-visible{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);}
  .save{
    background:var(--sage);color:#0f1613;border:none;border-radius:8px;
    font-family:inherit;font-size:13px;font-weight:600;
    padding:10px 16px;cursor:pointer;
  }
  .save:disabled{opacity:.4;cursor:not-allowed;}
  .save:focus-visible{outline:2px solid var(--text);outline-offset:2px;}

  .tally{display:flex;gap:8px;margin-bottom:18px;}
  .tally div{
    flex:1;text-align:center;
    border:1px solid var(--line);border-radius:8px;padding:10px 4px;
    background:var(--surface);
  }
  .tally b{display:block;font-size:20px;font-weight:600;line-height:1;}
  .tally span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
  .tally .okay b{color:var(--sage);}
  .tally .mixed b{color:var(--teal);}
  .tally .depleted b{color:var(--rust);}

  .log-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin:0 0 10px;
  }
  .log-head h2{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:500;margin:0;}
  .reset{background:none;border:none;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;text-decoration:underline;padding:0;}
  .reset:hover{color:var(--rust);}

  ul.log{list-style:none;margin:0;padding:0;}
  ul.log li{
    display:flex;align-items:baseline;gap:12px;
    padding:9px 0;border-top:1px solid var(--line);
  }
  ul.log li .date{color:var(--muted);font-size:12px;width:74px;flex:none;}
  ul.log li .dot{width:7px;height:7px;border-radius:50%;flex:none;align-self:center;}
  .dot.okay{background:var(--sage);}
  .dot.mixed{background:var(--teal);}
  .dot.depleted{background:var(--rust);}
  ul.log li .what{font-size:13px;}
  ul.log li .what em{color:var(--muted);font-style:italic;}
  .empty{color:var(--muted);font-size:13px;padding:14px 0;border-top:1px solid var(--line);}

  @media print{
    :root{--bg:#fbf9f4;--surface:#ffffff;--surface-2:#f1ede4;--line:#d8d2c4;--text:#1c2620;--muted:#5e6b60;}
    body{padding:0;}
    .save,.word-row,.readings,.reset{display:none;}
  }
</style>
</head>
<body>
  <header>
    <p class="eyebrow">After contact</p>
    <h1>How did that leave you?</h1>
    <p class="sub">One reading after each visit or exchange. No need to explain it — just clock it.</p>
  </header>

  <div class="card">
    <p class="prompt">A visit, a call, a thread of messages — log it while it's fresh.</p>
    <div class="readings" role="group" aria-label="How it left you">
      <button class="reading" data-v="okay">Okay</button>
      <button class="reading" data-v="mixed">Mixed</button>
      <button class="reading" data-v="depleted">Depleted</button>
    </div>
    <div class="word-row">
      <input type="text" id="word" maxlength="24" placeholder="one word (optional)" autocomplete="off">
      <button class="save" id="save" disabled>Log it</button>
    </div>
  </div>

  <div class="tally">
    <div class="okay"><b id="c-okay">0</b><span>Okay</span></div>
    <div class="mixed"><b id="c-mixed">0</b><span>Mixed</span></div>
    <div class="depleted"><b id="c-depleted">0</b><span>Depleted</span></div>
  </div>

  <div class="log-head">
    <h2>Recent</h2>
    <button class="reset" id="reset">clear all</button>
  </div>
  <ul class="log" id="log"></ul>

<script>
  const KEY = "contact-checkin-log";
  const LABELS = {okay:"Okay", mixed:"Mixed", depleted:"Depleted"};
  let selected = null;

  const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } };
  const save = (d) => localStorage.setItem(KEY, JSON.stringify(d));

  const fmt = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("en-GB", {day:"2-digit", month:"short"});
  };

  function render(){
    const data = load();
    const counts = {okay:0, mixed:0, depleted:0};
    data.forEach(e => counts[e.v]++);
    document.getElementById("c-okay").textContent = counts.okay;
    document.getElementById("c-mixed").textContent = counts.mixed;
    document.getElementById("c-depleted").textContent = counts.depleted;

    const log = document.getElementById("log");
    log.innerHTML = "";
    if(!data.length){
      log.innerHTML = '<li class="empty">Nothing logged yet. The first entry is the start of the pattern.</li>';
      return;
    }
    data.slice().reverse().forEach(e => {
      const li = document.createElement("li");
      li.innerHTML = `<span class="date">${fmt(e.t)}</span>`
        + `<span class="dot ${e.v}"></span>`
        + `<span class="what">${LABELS[e.v]}${e.w ? ` — <em>${escapeHtml(e.w)}</em>` : ""}</span>`;
      log.appendChild(li);
    });
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  document.querySelectorAll(".reading").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".reading").forEach(b => b.classList.remove("sel"));
      btn.classList.add("sel");
      selected = btn.dataset.v;
      document.getElementById("save").disabled = false;
    });
  });

  document.getElementById("save").addEventListener("click", () => {
    if(!selected) return;
    const word = document.getElementById("word").value.trim();
    const data = load();
    data.push({t:new Date().toISOString(), v:selected, w:word});
    save(data);
    selected = null;
    document.querySelectorAll(".reading").forEach(b => b.classList.remove("sel"));
    document.getElementById("word").value = "";
    document.getElementById("save").disabled = true;
    render();
  });

  document.getElementById("reset").addEventListener("click", () => {
    if(confirm("Clear all check-ins? This can't be undone.")){
      localStorage.removeItem(KEY);
      render();
    }
  });

  render();
</script>
</body>
</html>
