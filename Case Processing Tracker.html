<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Case Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:      #142019;
    --card:       #1d2d24;
    --ink:        #c2cfb2;
    --muted:      #8b9c7e;
    --faint:      #6f8473;
    --line:       #33493b;

    --forest:     #5fa39a;
    --forest-deep:#ece8db;
    --sage:       #5fa39a;
    --sage-tint:  #233a2e;
    --teal:       #5fa39a;
    --rust:       #c4673c;
    --rust-tint:  #322620;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "IBM Plex Mono", "Courier New", monospace;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    padding: 2.5rem 1.25rem 4rem;
    min-height: 100vh;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  /* Header */
  header { margin-bottom: 1.75rem; }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rust);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--forest-deep);
  }
  .datebar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.75rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }
  .date { font-size: 13px; color: var(--muted); font-weight: 400; }
  .goal-note { font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }
  .method {
    font-size: 11px; color: var(--faint);
    letter-spacing: 0.03em; line-height: 1.65;
    margin-top: 0.9rem;
  }
  .method b { color: var(--sage); font-weight: 500; }

  /* Progress bar */
  .progress-shell { margin: 1.5rem 0 1.75rem; }
  .progress-track {
    height: 5px;
    background: var(--line);
    border-radius: 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--teal);
    transition: width 0.35s ease;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 0.5rem;
  }

  /* Hour rows */
  .hour {
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 0;
    margin-bottom: 6px;
  }
  .hour.focused { border-left: 2px solid var(--teal); }
  .hour.complete {
    background: var(--sage-tint);
    border-color: var(--sage);
    border-left: 2px solid var(--sage);
  }
  .hour.lunch {
    background: transparent;
    border-color: var(--line);
    border-style: dashed;
    opacity: 0.7;
  }
  .hour-label {
    font-size: 13px;
    color: var(--ink);
    min-width: 136px;
    flex-shrink: 0;
    font-weight: 400;
  }
  .hour.complete .hour-label { color: var(--forest); font-weight: 500; }
  .hour.lunch .hour-label { color: var(--faint); font-style: italic; }
  .dots { display: flex; gap: 10px; flex: 1; }
  .dot {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--faint);
    background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.08s;
  }
  .dot:hover { border-color: var(--sage); background: var(--sage-tint); }
  .dot:active { transform: scale(0.9); }
  .dot.done {
    background: var(--forest);
    border-color: var(--forest);
  }
  .dot.done::after {
    content: ""; width: 8px; height: 8px;
    border-radius: 50%; background: var(--paper);
  }
  .dot:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }
  .lunch-note { font-size: 12px; color: var(--faint); font-style: italic; }
  .count {
    font-size: 11px; color: var(--faint);
    min-width: 28px; text-align: right;
    letter-spacing: 0.04em;
  }
  .hour.complete .count { color: var(--sage); }

  /* Discipline pills on each row */
  .disc { display: flex; gap: 6px; flex-shrink: 0; }
  .pill {
    font-family: "IBM Plex Mono", monospace;
    font-size: 11px; letter-spacing: 0.04em;
    padding: 5px 11px; border-radius: 0; cursor: pointer;
    background: transparent;
    border: 1px solid var(--faint);
    color: var(--muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .pill:hover { border-color: var(--sage); color: var(--ink); }
  .pill.focus.on { background: var(--teal); border-color: var(--teal); color: var(--paper); }
  .pill.brk.on   { background: var(--rust); border-color: var(--rust); color: var(--paper); }
  .pill:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  /* Footer */
  .footer {
    margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1px solid var(--line);
  }
  .discipline {
    display: flex; flex-wrap: wrap; gap: 22px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.04em;
    padding-bottom: 1.25rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--line);
  }
  .discipline b { color: var(--forest-deep); font-weight: 600; }
  .footer-main {
    display: flex; flex-wrap: wrap; gap: 20px;
    align-items: flex-end; justify-content: space-between;
  }
  .stats { display: flex; gap: 32px; }
  .stat .num {
    font-size: 28px; font-weight: 600; line-height: 1;
    color: var(--forest-deep);
  }
  .stat .lbl {
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    margin-top: 0.4rem;
  }
  .actions { display: flex; gap: 8px; }
  button.act {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--muted);
    background: var(--card); border: 1px solid var(--line);
    border-radius: 0; padding: 9px 14px; cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  button.act:hover {
    background: var(--rust-tint);
    border-color: var(--rust);
    color: var(--rust);
  }
  button.act:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .saved-tag {
    font-size: 11px; color: var(--sage);
    text-align: center; margin-top: 1.25rem;
    letter-spacing: 0.06em;
    opacity: 0; transition: opacity 0.3s;
  }
  .saved-tag.show { opacity: 1; }

  @media (max-width: 480px) {
    body { padding: 1.75rem 1rem 3rem; }
    h1 { font-size: 22px; }
    .hour { gap: 8px 10px; }
    .hour-label { min-width: 100%; }
    .disc { width: 100%; }
    .pill { flex: 1; text-align: center; }
    .footer-main { flex-direction: column; align-items: stretch; gap: 18px; }
    .actions { justify-content: stretch; }
    button.act { flex: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }

  @media print{
    :root{
      --paper:#fff; --card:#fff; --ink:#1d2a20; --muted:#566256; --faint:#7a8a78;
      --line:#cdd4c4; --forest:#2f6f6a; --forest-deep:#1d2a20; --sage:#2f6f6a;
      --sage-tint:#eef3ea; --teal:#2f6f6a; --rust:#a8542f; --rust-tint:#f3eae3;
    }
    body{padding:0;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">case processing</div>
    <h1>Daily tracker</h1>
    <div class="datebar">
      <span class="date" id="date"></span>
      <span class="goal-note">goal: 25 cases · ~3.6/hr</span>
    </div>
  </header>

  <div class="progress-shell">
    <div class="progress-track"><div class="progress-fill" id="fill"></div></div>
    <div class="progress-meta">
      <span id="meta-left">0 of 25 cases</span>
      <span id="meta-right">0%</span>
    </div>
  </div>

  <div id="rows"></div>

  <div class="footer">
    <div class="discipline">
      <span>focused blocks <b id="d-focus">0/7</b></span>
      <span>breaks taken <b id="d-break">0/7</b></span>
      <span>best streak <b id="d-streak">0</b></span>
    </div>
    <div class="footer-main">
      <div class="stats">
        <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">done</div></div>
        <div class="stat"><div class="num" id="s-remain">25</div><div class="lbl">to go</div></div>
      </div>
      <div class="actions">
        <button class="act" id="btn-reset">reset today</button>
        <button class="act" id="btn-new">new day</button>
      </div>
    </div>
  </div>

  <div class="saved-tag" id="saved">saved</div>
</div>

<script>
  var HOURS = [
    "08:00 – 09:00",
    "09:00 – 10:00",
    "10:00 – 11:00",
    "11:00 – 12:00",
    "12:00 – 13:00",
    "13:00 – 14:00",
    "14:00 – 15:00",
    "15:00 – 16:00"
  ];
  var LUNCH = 4;
  var GOAL = 25;
  var KEY = "case-tracker-v2";

  function freshRow() {
    return { cases: [false, false, false, false], focus: false, brk: false };
  }
  function fresh() {
    return HOURS.map(function () { return freshRow(); });
  }
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function validRow(r) {
    return r && Array.isArray(r.cases) && r.cases.length === 4
      && typeof r.focus === "boolean" && typeof r.brk === "boolean";
  }
  function valid(s) {
    return Array.isArray(s) && s.length === HOURS.length && s.every(validRow);
  }

  var state = fresh();
  var day = todayKey();

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        if (saved && valid(saved.state) && saved.date === day) {
          state = saved.state;
        }
      }
    } catch (e) {}
  }

  var savedTimer;
  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify({ date: day, state: state }));
      var tag = document.getElementById("saved");
      tag.classList.add("show");
      clearTimeout(savedTimer);
      savedTimer = setTimeout(function () { tag.classList.remove("show"); }, 1400);
    } catch (e) {}
  }

  function setDate() {
    var d = new Date();
    document.getElementById("date").textContent = d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  }

  function render() {
    var rows = document.getElementById("rows");
    rows.innerHTML = "";
    var total = 0;

    state.forEach(function (row, i) {
      var isLunch = (i === LUNCH);
      var done = isLunch ? 0 : row.cases.filter(Boolean).length;
      if (!isLunch) total += done;
      var full = !isLunch && done === 4 && row.focus;

      var div = document.createElement("div");
      div.className = "hour"
        + (isLunch ? " lunch" : "")
        + (full ? " complete" : "")
        + (!isLunch && row.focus && !full ? " focused" : "");

      var label = document.createElement("span");
      label.className = "hour-label";
      label.textContent = HOURS[i] + (isLunch ? " (lunch)" : "");
      div.appendChild(label);

      if (isLunch) {
        var ldots = document.createElement("div");
        ldots.className = "dots";
        var note = document.createElement("span");
        note.className = "lunch-note";
        note.textContent = "lunch break";
        ldots.appendChild(note);
        div.appendChild(ldots);
        rows.appendChild(div);
        return;
      }

      var dots = document.createElement("div");
      dots.className = "dots";
      row.cases.forEach(function (checked, j) {
        var dot = document.createElement("div");
        dot.className = "dot" + (checked ? " done" : "");
        dot.setAttribute("role", "checkbox");
        dot.setAttribute("aria-checked", String(checked));
        dot.setAttribute("aria-label", "Case " + (j + 1) + " for " + HOURS[i]);
        dot.setAttribute("tabindex", "0");
        dot.addEventListener("click", function () { toggleCase(i, j); });
        dot.addEventListener("keydown", function (e) {
          if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleCase(i, j); }
        });
        dots.appendChild(dot);
      });
      div.appendChild(dots);

      var count = document.createElement("span");
      count.className = "count";
      count.textContent = done + "/4";
      div.appendChild(count);

      var disc = document.createElement("div");
      disc.className = "disc";

      var fBtn = document.createElement("button");
      fBtn.type = "button";
      fBtn.className = "pill focus" + (row.focus ? " on" : "");
      fBtn.textContent = row.focus ? "focused" : "focus";
      fBtn.setAttribute("aria-pressed", String(row.focus));
      fBtn.setAttribute("aria-label", "Mark " + HOURS[i] + " as single-tasked");
      fBtn.addEventListener("click", function () { toggleFocus(i); });
      disc.appendChild(fBtn);

      var bBtn = document.createElement("button");
      bBtn.type = "button";
      bBtn.className = "pill brk" + (row.brk ? " on" : "");
      bBtn.textContent = row.brk ? "break ✓" : "break";
      bBtn.setAttribute("aria-pressed", String(row.brk));
      bBtn.setAttribute("aria-label", "Mark break taken after " + HOURS[i]);
      bBtn.addEventListener("click", function () { toggleBreak(i); });
      disc.appendChild(bBtn);

      div.appendChild(disc);
      rows.appendChild(div);
    });

    summary(total);
  }

  function toggleCase(i, j) {
    state[i].cases[j] = !state[i].cases[j];
    render();
    save();
  }
  function toggleFocus(i) {
    state[i].focus = !state[i].focus;
    render();
    save();
  }
  function toggleBreak(i) {
    state[i].brk = !state[i].brk;
    render();
    save();
  }

  function summary(total) {
    var remain = Math.max(0, GOAL - total);
    var pct = Math.min(100, Math.round((total / GOAL) * 100));
    document.getElementById("s-done").textContent = total;
    document.getElementById("s-remain").textContent = remain;
    document.getElementById("fill").style.width = pct + "%";
    document.getElementById("meta-left").textContent = total + " of " + GOAL + " cases";
    document.getElementById("meta-right").textContent = pct + "%";

    var working = state.filter(function (_, i) { return i !== LUNCH; });
    var totalBlocks = working.length;
    var focused = working.filter(function (r) { return r.focus; }).length;
    var breaks = working.filter(function (r) { return r.brk; }).length;

    var best = 0, cur = 0;
    working.forEach(function (r) {
      if (r.focus) { cur++; if (cur > best) best = cur; } else { cur = 0; }
    });

    document.getElementById("d-focus").textContent = focused + "/" + totalBlocks;
    document.getElementById("d-break").textContent = breaks + "/" + totalBlocks;
    document.getElementById("d-streak").textContent = best;
  }

  document.getElementById("btn-reset").addEventListener("click", function () {
    state = fresh(); render(); save();
  });
  document.getElementById("btn-new").addEventListener("click", function () {
    day = todayKey(); state = fresh(); setDate(); render(); save();
  });

  load();
  setDate();
  render();
</script>
</body>
</html>
