<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Case Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:      #f5f2eb;
    --card:       #f0ede5;
    --ink:        #1e2b22;
    --muted:      #5a6b5e;
    --faint:      #8fa094;
    --line:       #d6d0c4;

    --forest:     #2d5a3d;
    --forest-deep:#1e3d2a;
    --sage:       #7a9e82;
    --sage-tint:  #eaf0eb;
    --teal:       #3d7a72;
    --rust:       #b85c38;
    --rust-tint:  #f5e8e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "IBM Plex Mono", "Courier New", monospace;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    padding: 2.5rem 1.25rem 4rem;
    min-height: 100vh;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  /* Header */
  header { margin-bottom: 1.75rem; }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rust);
    font-weight: 500;
    margin-bottom: 0.5rem;
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--forest-deep);
  }
  .datebar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.75rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }
  .date { font-size: 13px; color: var(--muted); font-weight: 400; }
  .goal-note { font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }

  /* Progress bar */
  .progress-shell { margin: 1.5rem 0 1.75rem; }
  .progress-track {
    height: 5px;
    background: var(--line);
    border-radius: 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--teal);
    transition: width 0.35s ease;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.04em;
    margin-top: 0.5rem;
  }

  /* Hour rows */
  .hour {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 0;
    margin-bottom: 6px;
  }
  .hour.complete {
    background: var(--sage-tint);
    border-color: #c0d4c5;
  }
  .hour.lunch {
    background: transparent;
    border-color: var(--line);
    border-style: dashed;
    opacity: 0.7;
  }
  .hour-label {
    font-size: 13px;
    color: var(--ink);
    min-width: 136px;
    flex-shrink: 0;
    font-weight: 400;
  }
  .hour.complete .hour-label { color: var(--forest); font-weight: 500; }
  .hour.lunch .hour-label { color: var(--faint); font-style: italic; }
  .dots { display: flex; gap: 10px; flex: 1; }
  .dot {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--faint);
    background: transparent;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, transform 0.08s;
  }
  .dot:hover { border-color: var(--sage); background: var(--sage-tint); }
  .dot:active { transform: scale(0.9); }
  .dot.done {
    background: var(--forest);
    border-color: var(--forest);
  }
  .dot.done::after {
    content: ""; width: 8px; height: 8px;
    border-radius: 50%; background: var(--paper);
  }
  .dot:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }
  .lunch-note { font-size: 12px; color: var(--faint); font-style: italic; }
  .count {
    font-size: 11px; color: var(--faint);
    min-width: 28px; text-align: right;
    letter-spacing: 0.04em;
  }
  .hour.complete .count { color: var(--sage); }

  /* Footer */
  .footer {
    margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;
    justify-content: space-between;
  }
  .stats { display: flex; gap: 32px; }
  .stat .num {
    font-size: 28px; font-weight: 600; line-height: 1;
    color: var(--forest-deep);
  }
  .stat .lbl {
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    margin-top: 0.4rem;
  }
  .actions { display: flex; gap: 8px; }
  button.act {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px; color: var(--muted);
    background: var(--card); border: 1px solid var(--line);
    border-radius: 0; padding: 9px 14px; cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  button.act:hover {
    background: var(--rust-tint);
    border-color: #d4967a;
    color: var(--rust);
  }
  button.act:focus-visible { outline: 2px solid var(--rust); outline-offset: 2px; }

  .saved-tag {
    font-size: 11px; color: var(--sage);
    text-align: center; margin-top: 1.25rem;
    letter-spacing: 0.06em;
    opacity: 0; transition: opacity 0.3s;
  }
  .saved-tag.show { opacity: 1; }

  @media (max-width: 480px) {
    body { padding: 1.75rem 1rem 3rem; }
    h1 { font-size: 22px; }
    .hour { flex-wrap: wrap; gap: 8px 10px; }
    .hour-label { min-width: 100%; }
    .footer { flex-direction: column; align-items: stretch; gap: 18px; }
    .actions { justify-content: stretch; }
    button.act { flex: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">case processing</div>
    <h1>Daily tracker</h1>
    <div class="datebar">
      <span class="date" id="date"></span>
      <span class="goal-note">goal: 25 cases · ~3.6/hr</span>
    </div>
  </header>

  <div class="progress-shell">
    <div class="progress-track"><div class="progress-fill" id="fill"></div></div>
    <div class="progress-meta">
      <span id="meta-left">0 of 25 cases</span>
      <span id="meta-right">0%</span>
    </div>
  </div>

  <div id="rows"></div>

  <div class="footer">
    <div class="stats">
      <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">done</div></div>
      <div class="stat"><div class="num" id="s-remain">25</div><div class="lbl">to go</div></div>
    </div>
    <div class="actions">
      <button class="act" id="btn-reset">reset today</button>
      <button class="act" id="btn-new">new day</button>
    </div>
  </div>

  <div class="saved-tag" id="saved">saved</div>
</div>

<script>
  var HOURS = [
    "08:00 – 09:00",
    "09:00 – 10:00",
    "10:00 – 11:00",
    "11:00 – 12:00",
    "12:00 – 13:00",
    "13:00 – 14:00",
    "14:00 – 15:00",
    "15:00 – 16:00"
  ];
  var LUNCH = 4;
  var GOAL = 25;
  var KEY = "case-tracker-v1";

  function fresh() {
    return HOURS.map(function () { return [false, false, false, false]; });
  }
  function todayKey() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function valid(s) {
    return Array.isArray(s) && s.length === HOURS.length && s.every(function (r) { return Array.isArray(r) && r.length === 4; });
  }

  var state = fresh();
  var day = todayKey();

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        if (saved && valid(saved.state) && saved.date === day) {
          state = saved.state;
        }
      }
    } catch (e) {}
  }

  var savedTimer;
  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify({ date: day, state: state }));
      var tag = document.getElementById("saved");
      tag.classList.add("show");
      clearTimeout(savedTimer);
      savedTimer = setTimeout(function () { tag.classList.remove("show"); }, 1400);
    } catch (e) {}
  }

  function setDate() {
    var d = new Date();
    document.getElementById("date").textContent = d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  }

  function render() {
    var rows = document.getElementById("rows");
    rows.innerHTML = "";
    var total = 0;
    state.forEach(function (row, i) {
      var done = row.filter(Boolean).length;
      if (i !== LUNCH) total += done;
      var full = i !== LUNCH && done === 4;

      var div = document.createElement("div");
      div.className = "hour" + (i === LUNCH ? " lunch" : "") + (full ? " complete" : "");

      var label = document.createElement("span");
      label.className = "hour-label";
      label.textContent = HOURS[i] + (i === LUNCH ? " (lunch)" : "");
      div.appendChild(label);

      var dots = document.createElement("div");
      dots.className = "dots";
      if (i === LUNCH) {
        var note = document.createElement("span");
        note.className = "lunch-note";
        note.textContent = "lunch break";
        dots.appendChild(note);
      } else {
        row.forEach(function (checked, j) {
          var dot = document.createElement("div");
          dot.className = "dot" + (checked ? " done" : "");
          dot.setAttribute("role", "checkbox");
          dot.setAttribute("aria-checked", String(checked));
          dot.setAttribute("aria-label", "Case " + (j + 1) + " for " + HOURS[i]);
          dot.setAttribute("tabindex", "0");
          dot.addEventListener("click", function () { toggle(i, j); });
          dot.addEventListener("keydown", function (e) {
            if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(i, j); }
          });
          dots.appendChild(dot);
        });
      }
      div.appendChild(dots);

      var count = document.createElement("span");
      count.className = "count";
      count.textContent = i === LUNCH ? "" : done + "/4";
      div.appendChild(count);

      rows.appendChild(div);
    });
    summary(total);
  }

  function toggle(i, j) {
    state[i][j] = !state[i][j];
    render();
    save();
  }

  function summary(total) {
    var remain = Math.max(0, GOAL - total);
    var pct = Math.min(100, Math.round((total / GOAL) * 100));
    document.getElementById("s-done").textContent = total;
    document.getElementById("s-remain").textContent = remain;
    document.getElementById("fill").style.width = pct + "%";
    document.getElementById("meta-left").textContent = total + " of " + GOAL + " cases";
    document.getElementById("meta-right").textContent = pct + "%";
  }

  document.getElementById("btn-reset").addEventListener("click", function () {
    state = fresh(); render(); save();
  });
  document.getElementById("btn-new").addEventListener("click", function () {
    day = todayKey(); state = fresh(); setDate(); render(); save();
  });

  load();
  setDate();
  render();
</script>
</body>
</html>
